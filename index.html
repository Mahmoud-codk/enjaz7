<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Example</title>
    <style>
        #map {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Simple Google Map</h1>
    <div id="map"></div>

    <script>
        function initMap() {
            // Create a map centered at a default location (e.g., New York)
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 8,
                center: { lat: 40.7128, lng: -74.0060 },
            });
        }
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA3WiP8sFUtdS4y1ziDTUTecnNNWVWWI4Q&callback=initMap"></script>
</body>
</html>
